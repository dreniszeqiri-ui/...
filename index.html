<index.html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Should You Like Me? ❤️</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ffb6d9, #ffeef7);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 25px;
        max-width: 700px;
        width: 85%;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        position: relative;
        z-index: 10;
        transition: opacity 0.5s ease, transform 0.5s ease;
    }

    h1 {
        color: #ff4081;
    }

    p {
        font-size: 24px;
        min-height: 60px;
    }

    button {
        padding: 12px 28px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        margin-top: 15px;
    }

    #yesBtn { background: #4CAF50; color: white; }
    #noBtn { background: #ff5252; color: white; position: relative; }

    #choiceButtons {
        display: none;
    }

    .heart {
        position: absolute;
        font-size: 24px;
        animation: float 6s linear infinite;
    }

    @keyframes float {
        from { transform: translateY(100vh); }
        to { transform: translateY(-120vh); }
    }
</style>
</head>

<body>

<!-- 🎵 Music (fixed autoplay behavior) -->
<iframe
    id="music"
    width="0"
    height="0"
    frameborder="0"
    allow="autoplay"
></iframe>

<div class="container" id="box">
    <h1 id="title">Why should you like me? ❤️</h1>

    <p id="text">Press start to begin...</p>

    <button id="nextBtn" onclick="nextPage()">Start</button>

    <div id="choiceButtons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 🙈</button>
    </div>
</div>

<script>
const pages = [
    "I genuinely care about the people close to me. ❤️",
    "I listen when someone needs to talk. 🎧",
    "I can make people laugh, even in awkward moments. 😂",
    "I support the people I care about. 🤝",
    "I remember the little things that matter. 🧠",
    "I might be shy sometimes, but I always mean well. 💬",
    "When I care about someone, I put real effort. ✨",
    "I try to be kind and understanding. 🌟",
    "Life is better when shared with someone special. 🎉",
    "And honestly... getting to know me is the best way to decide. 😊"
];

let currentPage = -1;
let musicStarted = false;

function startMusic() {
    if (!musicStarted) {
        document.getElementById("music").src =
            "https://www.youtube.com/embed/pdDud1JYYhw?autoplay=1&loop=1&playlist=pdDud1JYYhw";
        musicStarted = true;
    }
}

function fade() {
    const box = document.getElementById("box");

    box.style.opacity = 0;
    box.style.transform = "scale(0.95)";

    setTimeout(() => {
        box.style.opacity = 1;
        box.style.transform = "scale(1)";
    }, 300);
}

function nextPage() {
    startMusic();
    currentPage++;

    if (currentPage < pages.length) {
        fade();

        document.getElementById("title").textContent =
            `Reason ${currentPage + 1} ❤️`;

        document.getElementById("text").textContent =
            pages[currentPage];

        document.getElementById("nextBtn").textContent = "Next ➜";
    } else {
        fade();

        document.getElementById("title").textContent =
            "So... what do you think?";

        document.getElementById("text").textContent =
            "If you feel comfortable with it... can I have a chance?";

        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("choiceButtons").style.display = "block";
    }
}

// YES BUTTON
document.getElementById("yesBtn").onclick = () => {
    document.getElementById("title").textContent = "That's nice 😊";
    document.getElementById("text").textContent =
        "I appreciate you for being honest. That means a lot.";
    document.getElementById("choiceButtons").style.display = "none";
};

// NO BUTTON RUNS AWAY
document.getElementById("noBtn").addEventListener("mouseover", function() {
    this.style.position = "fixed";
    this.style.left = Math.random() * (window.innerWidth - 100) + "px";
    this.style.top = Math.random() * (window.innerHeight - 60) + "px";
});

// FLOATING HEARTS
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 400);
</script>

</body>
</html>
